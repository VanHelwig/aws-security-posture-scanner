name: CI

on:
  push:
  pull_request:

jobs:
  python-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Terraform format check
        run: make terraform-fmt

      - name: Terraform validate
        run: make terraform-validate  